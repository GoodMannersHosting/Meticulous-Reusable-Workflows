# Agent: installs Trivy into workspace when missing (Linux or macOS); Docker optional for image mode.
name: trivy-scan
version: "1.2.0"
description: Filesystem or image scan with Trivy; optional CycloneDX SBOM for Meticulous SBOM tab.
inputs:
  mode:
    type: string
    required: false
    default: fs
    description: fs or image.
  target:
    type: string
    required: true
    description: For fs — path relative to workspace. For image — image reference (e.g. alpine:3.20).
  cyclonedx_path:
    type: string
    required: false
    default: "sbom.cdx.json"
    description: Write CycloneDX JSON to this path under METICULOUS_WORKSPACE (agent uploads this path as the run SBOM when it is sbom.cdx.json).
  registry_host:
    type: string
    required: false
    default: ""
    description: For image mode only — if set with REGISTRY_USERNAME / REGISTRY_PASSWORD in job env (pipeline secrets), run docker login before trivy image scan so private registries resolve.
  trivy_version:
    type: string
    required: false
    default: "0.69.3"
    description: Trivy release version to download when trivy is not on PATH (no leading v; must match published tarballs).
jobs:
  - name: Scan
    id: scan
    steps:
      - name: trivy
        run: |
          set -euo pipefail
          WS="${METICULOUS_WORKSPACE:?}"
          MODE="${{ inputs.mode }}"
          TARGET="${{ inputs.target }}"
          OUT="${WS}/${{ inputs.cyclonedx_path }}"
          case "${{ inputs.cyclonedx_path }}" in (*..*|/*) echo "bad cyclonedx path" >&2; exit 1;; esac
          if ! command -v trivy >/dev/null 2>&1; then
            TV="${{ inputs.trivy_version }}"
            TV="${TV#v}"
            UNAME_S="$(uname -s)"
            UM="$(uname -m)"
            case "${UM}" in
              x86_64) TM_ARCH=64bit ;;
              aarch64|arm64) TM_ARCH=ARM64 ;;
              *) echo "unsupported arch ${UM}" >&2; exit 1 ;;
            esac
            if [ "${UNAME_S}" = "Darwin" ]; then
              TF="trivy_${TV}_macOS-${TM_ARCH}.tar.gz"
            elif [ "${UNAME_S}" = "Linux" ]; then
              TF="trivy_${TV}_Linux-${TM_ARCH}.tar.gz"
            else
              echo "trivy bootstrap: unsupported OS ${UNAME_S}" >&2
              exit 1
            fi
            TC="${WS}/.toolcache/trivy"
            mkdir -p "${TC}"
            curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TV}/${TF}" -o /tmp/trivy.tgz
            tar -xzf /tmp/trivy.tgz -C "${TC}"
            export PATH="${TC}:${PATH}"
          fi
          # Trivy pulls the vuln DB over OCI; it reads Docker's config.json for registry auth helpers.
          # A host config with credsStore=docker-credential-desktop breaks headless agents (helper missing).
          _TDOCKER="${METICULOUS_WORKSPACE:-${TMPDIR:-/tmp}}/.met-trivy-docker-config-$$"
          mkdir -p "${_TDOCKER}"
          printf '%s\n' '{"auths":{}}' > "${_TDOCKER}/config.json"
          export DOCKER_CONFIG="${_TDOCKER}"
          # When the Docker daemon is not available, use Podman's Docker-compatible socket (agent must expose it).
          if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
            if command -v podman >/dev/null 2>&1 && podman info >/dev/null 2>&1; then
              for _sock in /run/podman/podman.sock "${XDG_RUNTIME_DIR:-}"/podman/podman.sock; do
                if [ -S "${_sock}" ]; then
                  export DOCKER_HOST="unix://${_sock}"
                  echo "Using Podman Docker API at ${_sock}" >&2
                  break
                fi
              done
            fi
          fi
          if [ "${MODE}" = "fs" ]; then
            case "${TARGET}" in (*..*|/*) exit 1;; esac
            # Report HIGH/CRITICAL but do not fail the step (SBOM generation must still run).
            trivy fs --exit-code 0 --scanners vuln,secret,misconfig --severity HIGH,CRITICAL "${WS}/${TARGET}"
            trivy fs --format cyclonedx --output "${OUT}" "${WS}/${TARGET}"
          elif [ "${MODE}" = "image" ]; then
            REG_HOST="${{ inputs.registry_host }}"
            if [ -n "${REG_HOST}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                echo "${REGISTRY_PASSWORD}" | docker login -u "${REGISTRY_USERNAME:-}" --password-stdin "${REG_HOST}"
              elif command -v podman >/dev/null 2>&1 && podman info >/dev/null 2>&1; then
                echo "${REGISTRY_PASSWORD}" | podman login -u "${REGISTRY_USERNAME:-}" --password-stdin "${REG_HOST}"
              else
                echo "registry_host set but no working docker/podman for login" >&2
                exit 1
              fi
            fi
            trivy image --exit-code 0 --scanners vuln,secret,misconfig --severity HIGH,CRITICAL "${TARGET}"
            trivy image --format cyclonedx --output "${OUT}" "${TARGET}"
          else
            echo "mode must be fs or image" >&2
            exit 1
          fi
