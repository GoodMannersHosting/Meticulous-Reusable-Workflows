# Agent: installs crate-ci/typos release binary when not on PATH (Linux or macOS).
name: typos
version: "1.1.0"
description: Run crate-ci/typos over the workspace or a subpath.
inputs:
  path:
    type: string
    required: false
    default: "."
    description: Path relative to METICULOUS_WORKSPACE to scan.
  config:
    type: string
    required: false
    description: Optional path to `_typos.toml` relative to workspace (must not traverse ..).
  typos_version:
    type: string
    required: false
    default: "1.45.0"
    description: crate-ci/typos release tag without leading v (e.g. 1.45.0; use a release that ships your OS/arch combo).
jobs:
  - name: Typos
    id: typos
    steps:
      - name: Check
        run: |
          set -euo pipefail
          WS="${METICULOUS_WORKSPACE:?}"
          SUB="${{ inputs.path }}"
          case "${SUB}" in (*..*) echo "invalid path" >&2; exit 1;; esac
          SCAN="${WS}/${SUB}"
          ARGS=(--format brief)
          CFG="${{ inputs.config }}"
          if [ -n "${CFG}" ]; then
            case "${CFG}" in (*..*|/*) echo "invalid config path" >&2; exit 1;; esac
            ARGS+=(--config "${WS}/${CFG}")
          fi
          if ! command -v typos >/dev/null 2>&1; then
            TV="${{ inputs.typos_version }}"
            TV="${TV#v}"
            UNAME_S="$(uname -s)"
            UM="$(uname -m)"
            case "${UNAME_S}" in
              Linux)
                case "${UM}" in
                  x86_64) TRIPLET="x86_64-unknown-linux-musl" ;;
                  aarch64) TRIPLET="aarch64-unknown-linux-musl" ;;
                  *) echo "unsupported arch ${UM}" >&2; exit 1 ;;
                esac
                ;;
              Darwin)
                case "${UM}" in
                  x86_64) TRIPLET="x86_64-apple-darwin" ;;
                  arm64|aarch64) TRIPLET="aarch64-apple-darwin" ;;
                  *) echo "unsupported arch ${UM}" >&2; exit 1 ;;
                esac
                ;;
              *) echo "typos bootstrap: unsupported OS ${UNAME_S}" >&2; exit 1 ;;
            esac
            TD="${WS}/.toolcache/typos"
            mkdir -p "${TD}"
            URL="https://github.com/crate-ci/typos/releases/download/v${TV}/typos-v${TV}-${TRIPLET}.tar.gz"
            curl -fsSL "${URL}" -o /tmp/typos.tgz
            tar -xzf /tmp/typos.tgz -C "${TD}"
            export PATH="${TD}:${PATH}"
          fi
          typos "${ARGS[@]}" "${SCAN}"
