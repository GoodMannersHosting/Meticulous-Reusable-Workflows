# Agent: terraform on PATH or HashiCorp zip downloaded for Linux/macOS (amd64/arm64).
name: terraform
version: "1.1.0"
description: terraform fmt -check, init, validate, plan; optional gated apply.
inputs:
  terraform_version:
    type: string
    required: false
    default: "1.9.8"
    description: Version to install when terraform is missing on PATH.
  working_dir:
    type: string
    required: false
    default: "."
    description: Directory under workspace containing Terraform files (no ..).
  run_apply:
    type: string
    required: false
    default: "false"
    description: If true string, run apply after plan (use with extreme care).
  apply_confirmation:
    type: string
    required: false
    description: Must equal literal YES_APPLY to allow apply when run_apply is true.
jobs:
  - name: Terraform
    id: tf
    steps:
      - name: Run
        run: |
          set -euo pipefail
          WS="${METICULOUS_WORKSPACE:?}"
          WDIR="${{ inputs.working_dir }}"
          case "${WDIR}" in (*..*) exit 1;; esac
          cd "${WS}/${WDIR}"
          if ! command -v terraform >/dev/null 2>&1; then
            VER="${{ inputs.terraform_version }}"
            UNAME_S="$(uname -s)"
            UM="$(uname -m)"
            case "${UNAME_S}-${UM}" in
              Linux-x86_64) TF_OS_ARCH=linux_amd64 ;;
              Linux-aarch64) TF_OS_ARCH=linux_arm64 ;;
              Darwin-x86_64) TF_OS_ARCH=darwin_amd64 ;;
              Darwin-arm64) TF_OS_ARCH=darwin_arm64 ;;
              *) echo "terraform bootstrap: unsupported ${UNAME_S} ${UM}" >&2; exit 1 ;;
            esac
            TD="${WS}/.toolcache/terraform"
            mkdir -p "${TD}"
            curl -fsSL "https://releases.hashicorp.com/terraform/${VER}/terraform_${VER}_${TF_OS_ARCH}.zip" -o /tmp/tf.zip
            unzip -o /tmp/tf.zip -d "${TD}"
            export PATH="${TD}:${PATH}"
          fi
          terraform fmt -check -recursive
          terraform init -input=false
          terraform validate
          terraform plan -input=false -out=tfplan
          if [ "${{ inputs.run_apply }}" = "true" ]; then
            if [ "${{ inputs.apply_confirmation }}" != "YES_APPLY" ]; then
              echo "apply blocked: set apply_confirmation to YES_APPLY" >&2
              exit 1
            fi
            terraform apply -input=false tfplan
          fi
