# Agent: curl, bash. Linux or macOS. Runs Opengrep via official release binary or install.sh (latest).
# Results are written to opengrep-report.json in the workspace root.
# Fails on any finding when fail_on_findings is true.
#
# No account, API token, or container engine required.
name: opengrep
version: "1.1.1"
description: OSS SAST via Opengrep binary — no account or container engine required.
inputs:
  scan_path:
    type: string
    required: false
    default: "."
    description: Path relative to workspace to scan (no ..).
  config:
    type: string
    required: false
    default: "auto"
    description: Opengrep ruleset (auto, p/rust, p/security-audit, or path to local rules).
  output_file:
    type: string
    required: false
    default: "opengrep-report.json"
    description: Output JSON report filename relative to METICULOUS_WORKSPACE.
  fail_on_findings:
    type: string
    required: false
    default: "true"
    description: Exit non-zero when findings are found.
  version:
    type: string
    required: false
    default: "latest"
    description: Opengrep release tag to install (e.g. v1.16.5). Defaults to latest.
jobs:
  - name: Scan
    id: scan
    steps:
      - name: Install opengrep
        run: |
          set -euo pipefail
          WS="${METICULOUS_WORKSPACE:?}"
          INSTALL_DIR="${WS}/.opengrep-bin"
          mkdir -p "${INSTALL_DIR}"

          VERSION="${{ inputs.version }}"
          if [ "${VERSION}" = "latest" ]; then
            curl -fsSL "https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh" | bash
            if [ -x "${INSTALL_DIR}/opengrep" ]; then
              :
            elif command -v opengrep >/dev/null 2>&1; then
              cp "$(command -v opengrep)" "${INSTALL_DIR}/opengrep"
            else
              echo "opengrep install.sh did not leave a usable opengrep on PATH or in ${INSTALL_DIR}" >&2
              exit 1
            fi
          else
            UNAME_S="$(uname -s)"
            ARCH="$(uname -m)"
            case "${UNAME_S}" in
              Linux)
                case "${ARCH}" in
                  x86_64) ASSET="opengrep_musllinux_x86" ;;
                  aarch64) ASSET="opengrep_musllinux_aarch64" ;;
                  *) echo "Unsupported Linux arch: ${ARCH}" >&2; exit 1 ;;
                esac
                ;;
              Darwin)
                case "${ARCH}" in
                  x86_64) ASSET="opengrep_osx_x86" ;;
                  arm64) ASSET="opengrep_osx_arm64" ;;
                  *) echo "Unsupported Darwin arch: ${ARCH}" >&2; exit 1 ;;
                esac
                ;;
              *) echo "Unsupported OS: ${UNAME_S}" >&2; exit 1 ;;
            esac
            BINARY_URL="https://github.com/opengrep/opengrep/releases/download/${VERSION}/${ASSET}"
            curl -fsSL "${BINARY_URL}" -o "${INSTALL_DIR}/opengrep"
            chmod +x "${INSTALL_DIR}/opengrep"
          fi

          "${INSTALL_DIR}/opengrep" --version

      - name: Opengrep scan
        run: |
          set -euo pipefail
          WS="${METICULOUS_WORKSPACE:?}"
          # Meticulous does not set METICULOUS_ENV between steps (unlike GITHUB_ENV). Use the same
          # install path as the previous step.
          OPENGREP_BIN="${WS}/.opengrep-bin/opengrep"
          if [ ! -x "${OPENGREP_BIN}" ]; then
            echo "opengrep binary missing at ${OPENGREP_BIN}; install step must run first" >&2
            exit 1
          fi
          case "${{ inputs.scan_path }}" in (*..*) exit 1;; esac
          case "${{ inputs.output_file }}" in (*..*) exit 1;; esac

          SCAN="${WS}/${{ inputs.scan_path }}"
          OUT="${WS}/${{ inputs.output_file }}"
          FAIL="${{ inputs.fail_on_findings }}"

          # Run opengrep; capture exit code so we can write the report first.
          set +e
          "${OPENGREP_BIN}" scan \
            --config "${{ inputs.config }}" \
            --json \
            --output "${OUT}" \
            "${SCAN}"
          EXIT_CODE=$?
          set -e

          if [ -f "${OUT}" ]; then
            FINDINGS=$(python3 -c "import json,sys; d=json.load(open('${OUT}')); print(len(d.get('results',[])))" 2>/dev/null || echo "?")
            echo "Opengrep findings: ${FINDINGS}"
          fi

          if [ "${FAIL}" = "true" ] && [ "${EXIT_CODE}" -ne 0 ]; then
            echo "Opengrep found issues. Review ${OUT} for details." >&2
            exit "${EXIT_CODE}"
          fi
          exit 0
