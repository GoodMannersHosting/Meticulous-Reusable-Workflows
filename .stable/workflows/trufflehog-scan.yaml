# Agent: curl, sh. Linux or macOS. Downloads a pinned TruffleHog release (update version with asset names in sync).
# Set TRUFFLEHOG_VERSION / EXPECTED_SHA256 via pipeline vars when importing; do not commit credentials.
name: trufflehog-scan
version: "1.2.0"
description: Run TruffleHog filesystem scan; fails on verified secrets by default (override with fail_on_findings).
inputs:
  scan_path:
    type: string
    required: false
    default: "."
    description: Path relative to workspace to scan (no ..).
  base_ref:
    type: string
    required: false
    description: Optional git base ref for --since-commit (must exist if set).
  trufflehog_version:
    type: string
    required: false
    default: "3.88.0"
    description: GitHub release tag (no leading v in asset name for some releases — verify asset URLs).
  binary_path:
    type: string
    required: false
    description: If set, use this trufflehog binary on PATH instead of downloading.
  fail_on_findings:
    type: string
    required: false
    default: "true"
    description: If "false", run the scan and print results but exit 0 even when TruffleHog finds verified secrets (omits --fail).
jobs:
  - name: Scan
    id: scan
    steps:
      - name: trufflehog
        run: |
          set -euo pipefail
          WS="${METICULOUS_WORKSPACE:?}"
          SUB="${{ inputs.scan_path }}"
          case "${SUB}" in (*..*) exit 1;; esac
          SCAN="${WS}/${SUB}"
          BIN="${{ inputs.binary_path }}"
          if [ -n "${BIN}" ]; then
            TH="${BIN}"
          else
            VER="${{ inputs.trufflehog_version }}"
            UNAME_S="$(uname -s)"
            ARCH="$(uname -m)"
            case "${ARCH}" in (x86_64) ARCH=amd64;; (aarch64|arm64) ARCH=arm64;; (*) echo "arch" >&2; exit 1;; esac
            case "${UNAME_S}" in
              Linux) TH_OS=linux ;;
              Darwin) TH_OS=darwin ;;
              *) echo "trufflehog bootstrap: unsupported OS ${UNAME_S}" >&2; exit 1 ;;
            esac
            URL="https://github.com/trufflesecurity/trufflehog/releases/download/v${VER}/trufflehog_${VER}_${TH_OS}_${ARCH}.tar.gz"
            echo "Download ${URL}"
            curl -fsSL "${URL}" -o /tmp/th.tgz
            tar -xzf /tmp/th.tgz -C /tmp
            TH="/tmp/trufflehog"
          fi
          ARGS=(filesystem "${SCAN}" --no-update)
          FAIL_ON="${{ inputs.fail_on_findings }}"
          case "${FAIL_ON}" in
            false|0|no|FALSE|No) ;;
            *) ARGS+=(--fail) ;;
          esac
          BASE="${{ inputs.base_ref }}"
          if [ -n "${BASE}" ]; then
            ARGS+=(--since-commit "${BASE}")
          fi
          "${TH}" "${ARGS[@]}"
